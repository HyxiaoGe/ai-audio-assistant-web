name: AI Audio Web Build & Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-audio-web-build-deploy-${{ github.ref }}
  cancel-in-progress: true

# 镜像源:阿里云 ACR 个人版(深圳),替代原 ghcr.io。
# 动机:Windows 构建机与 dev 部署机同处国内,镜像却经 ghcr(海外 Fastly)跨境往返一圈,
# 1.49GB 大镜像在 GFW 链路上 pull 反复被 reset(部署反复栽在 Login/Pull GHCR)。改走境内 ACR 去掉跨境跳。
env:
  REGISTRY: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-77w10wlykpqilmmb.cn-shenzhen.personal.cr.aliyuncs.com/seanfield/ai-audio-assistant-web

jobs:
  build:
    name: Build on Windows runner
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 40
    outputs:
      started_at: ${{ steps.pipeline_start.outputs.started_at }}
      runner_name: ${{ steps.pipeline_start.outputs.runner_name }}
    defaults:
      run:
        shell: cmd

    steps:
      - name: Record pipeline start
        id: pipeline_start
        run: |
          for /f %%i in ('powershell -NoProfile -ExecutionPolicy Bypass -Command "[DateTimeOffset]::UtcNow.ToUnixTimeSeconds()"') do echo started_at=%%i>>%GITHUB_OUTPUT%
          echo runner_name=${{ runner.name }}>>%GITHUB_OUTPUT%

      - name: Push CI/CD active metric
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command ". '{0}'"
        run: |
          $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          $metrics = @"
          # HELP cicd_pipeline_active Whether a CI/CD pipeline is currently active (1=true, 0=false).
          # TYPE cicd_pipeline_active gauge
          cicd_pipeline_active{project="ai-audio-assistant-web",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} 1
          # HELP cicd_pipeline_active_timestamp_seconds Timestamp of the latest CI/CD active-state update.
          # TYPE cicd_pipeline_active_timestamp_seconds gauge
          cicd_pipeline_active_timestamp_seconds{project="ai-audio-assistant-web",branch="$env:GITHUB_REF_NAME",environment="dev",runner="${{ runner.name }}"} $now
          "@
          $body = (($metrics -replace "`r`n", "`n").Trim() + "`n")
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-WebRequest -UseBasicParsing -Method Post -Uri "http://192.168.1.10:9092/metrics/job/cicd_active/project_key/ai-audio-assistant-web/branch_key/master/environment_key/dev" -ContentType "text/plain; version=0.0.4" -Body $bytes

      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Docker access
        run: |
          docker version
          docker ps

      - name: Build Docker image
        run: |
          docker build --build-arg GIT_SHA=%GITHUB_SHA% -t "%IMAGE_NAME%:%GITHUB_SHA%" .

      - name: Lint in image
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" sh -lc "pip install --no-cache-dir ruff && ruff check app/ worker/ tests/"

      - name: Run tests
        timeout-minutes: 8
        run: |
          docker run --rm "%IMAGE_NAME%:%GITHUB_SHA%" sh -lc "pip install --no-cache-dir pytest pytest-asyncio pytest-mock pytest-cov aiosqlite && pytest tests/ -v"

      - name: Login to ACR
        # cmd 的 `echo %VAR% | docker login --password-stdin` 在 Windows docker 上把口令传歪 → ACR 判 401
        # (dev bash 同一凭据三元组可成功登录,已排除凭据错)。改 -p 直传参数,绕开 echo/stdin 管道。
        # runner 为私有自托管机、secret 在 GitHub 日志中被掩码,-p 在此场景安全。
        run: docker login %REGISTRY% -u %ACR_USERNAME% -p %ACR_PASSWORD%
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Push Docker image
        run: docker push "%IMAGE_NAME%:%GITHUB_SHA%"

      - name: Cleanup local Docker artifacts
        if: always()
        run: |
          docker image rm "%IMAGE_NAME%:%GITHUB_SHA%" 2>NUL
          docker builder prune --filter "until=72h" -f

  deploy-dev:
    name: Deploy master on dev server
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15

    steps:
      - name: Record deploy start time
        run: echo "DEPLOY_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Login to ACR
        run: echo "${ACR_PASSWORD}" | docker login "${REGISTRY}" -u "${ACR_USERNAME}" --password-stdin
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Apply alembic migrations
        run: |
          cd ~/project/ai-audio-assistant-web
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 用 docker --env-file 让 docker 自己解析 .env，而不是 bash source。
          # bash source 会把 YOUTUBE_OUTPUT_TEMPLATE=%(id)s.%(ext)s 这类含 ( 的值当 subshell 启动失败。
          docker run --rm \
            --network ai-audio-network \
            --env-file .env \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            alembic upgrade head

      - name: Pull and restart api/worker/beat
        run: |
          cd ~/project/ai-audio-assistant-web
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cat > docker-compose.ai-audio-web-ghcr.yml <<'EOF'
          x-common: &common
            image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
            env_file: .env
            environment:
              TZ: UTC
            restart: unless-stopped
            volumes:
              - ./data:/app/data
            networks:
              - ai-audio-network

          services:
            api:
              <<: *common
              container_name: ai-audio-assistant-web-api
              # 2 个 uvicorn worker 利用多核(单进程仅吃 1 核;压测基线 /health ~450RPS 即单核饱和、7 核闲置)。
              # 约束:每 worker 自带一套 DB 连接池(DB_POOL_SIZE+MAX_OVERFLOW),worker 翻倍即把池减半,
              # 让 api 对共享 Postgres 的连接上限持平 2×(5+10)=30(=原单 worker 10+20),不挤占跨应用连接预算。
              command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
              environment:
                TZ: UTC
                DB_POOL_SIZE: "5"
                DB_MAX_OVERFLOW: "10"
              ports:
                - "8088:8000"
              # 2 worker × ~175MiB + 余量;主机可用 ~6.1GiB 足以吸收(原 384m 仅够单 worker)。
              mem_limit: 768m

            worker:
              <<: *common
              container_name: ai-audio-assistant-web-worker
              command: celery -A worker.celery_app worker --loglevel=info --autoscale=8,1
              mem_limit: 1g

            beat:
              <<: *common
              container_name: ai-audio-assistant-web-beat
              command: celery -A worker.celery_app beat --loglevel=info
              mem_limit: 192m

          networks:
            ai-audio-network:
              external: true
          EOF
          # 兜底：清掉旧 compose project 持有的容器，避免首次切换 GHCR 时容器名冲突
          docker rm -f ai-audio-assistant-web-api-1 ai-audio-assistant-web-worker-1 ai-audio-assistant-web-beat-1 2>/dev/null || true
          docker rm -f ai-audio-assistant-web-api ai-audio-assistant-web-worker ai-audio-assistant-web-beat 2>/dev/null || true
          docker compose -f docker-compose.ai-audio-web-ghcr.yml up -d

      - name: Verify readiness
        run: |
          # 探 /readiness(Postgres/Redis/Celery 全活才 200 "ready";任一挂 → 503)。
          # 真 smoke test:此前 curl /health 静态 stub,依赖全挂也绿。
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8088/api/v1/readiness | grep -q '"status":"ready"'; then
              exit 0
            fi
            sleep 2
          done

          echo "readiness 未就绪,最后一次响应:"
          curl -sS http://127.0.0.1:8088/api/v1/readiness || true
          docker logs --tail=120 ai-audio-assistant-web-api || true
          exit 1

      - name: Cleanup old images
        if: always()
        run: |
          current="${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' ${{ env.IMAGE_NAME }} \
            | awk -v current="$current" '$1 != current {print $2}' \
            | sort -u \
            | xargs -r docker rmi || true

      - name: Push CI/CD metrics
        if: always()
        run: |
          bash ~/scripts/push-cicd-metrics.sh \
            ai-audio-assistant-web \
            "${{ github.ref_name }}" \
            dev \
            "${{ job.status }}" \
            "${{ needs.build.outputs.started_at }}" \
            "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            "${{ github.sha }}" \
            "${{ needs.build.outputs.runner_name }}" \
            ai-audio-assistant-web \
            "${{ env.DEPLOY_START }}"

      - name: 通知飞书(部署结果)
        if: always()
        continue-on-error: true
        env:
          FEISHU_INFRA_WEBHOOK: ${{ secrets.FEISHU_INFRA_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # 提交信息可含任意字符,只经 env 传入 python(os.environ→json),绝不进 shell,杜绝注入。
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$FEISHU_INFRA_WEBHOOK" ]; then
            echo "FEISHU_INFRA_WEBHOOK 未配置,跳过飞书通知"
            exit 0
          fi
          export SHORT_SHA="${GITHUB_SHA:0:7}"
          export DEPLOY_TS="$(date -u '+%Y-%m-%d %H:%M UTC')"
          python3 - <<'PY'
          import json, os, urllib.request
          ok = os.environ.get("JOB_STATUS") == "success"
          repo = os.environ.get("REPO", "")
          ref = os.environ.get("REF_NAME", "")
          sha = os.environ.get("SHORT_SHA", "")
          status = os.environ.get("JOB_STATUS", "")
          ts = os.environ.get("DEPLOY_TS", "")
          run_url = os.environ.get("RUN_URL", "")
          raw = os.environ.get("COMMIT_MSG", "") or ""
          lines = [ln for ln in raw.splitlines() if ln.strip()]
          msg = "\n".join(lines[:3]) if lines else "(无提交信息)"
          if len(msg) > 240:
              msg = msg[:240] + "…"
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {
                      "template": "green" if ok else "red",
                      "title": {"tag": "plain_text",
                                "content": ("✅ 部署成功 · " if ok else "❌ 部署失败 · ") + repo},
                  },
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"**提交信息**\n{msg}"}},
                      {"tag": "hr"},
                      {"tag": "div", "fields": [
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**分支**\n{ref}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**提交**\n`{sha}`"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**结果**\n{status}"}},
                          {"is_short": True, "text": {"tag": "lark_md", "content": f"**时间**\n{ts}"}},
                      ]},
                      {"tag": "action", "actions": [
                          {"tag": "button", "type": "primary",
                           "text": {"tag": "plain_text", "content": "查看运行日志"},
                           "url": run_url}]},
                      {"tag": "note", "elements": [
                          {"tag": "plain_text", "content": "🤖 UptimeKuma · CI/CD 部署告警"}]},
                  ],
              },
          }
          data = json.dumps(card).encode()
          req = urllib.request.Request(
              os.environ["FEISHU_INFRA_WEBHOOK"], data=data,
              headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"飞书响应 http={r.status} body={r.read().decode()}")
          except Exception as e:
              print(f"飞书通知失败(忽略): {e!r}")
          PY
