name: Deploy to Dev Server (Legacy / Manual Fallback)

# 主流水线已切到 build-and-deploy.yml（Windows runner build → push GHCR → dev pull）。
# 这个 workflow 退化成 GHCR 故障 / Windows runner 离线时的手动应急入口：dev 自 build。
# 不再随 master push 触发，避免和 GHCR 路径双跑造成镜像版本冲突。
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Deploy
        run: |
          cd ~/project/ai-audio-assistant-web
          git pull
          if git diff HEAD~1 --name-only | grep -qE 'pyproject\.toml|uv\.lock|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f

      - name: Push deploy metrics
        if: always()
        run: bash ~/scripts/push-deploy-metrics.sh ai-audio-assistant-web master ${{ job.status }} ${{ env.BUILD_START }}
