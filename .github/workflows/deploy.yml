name: Deploy to Dev Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Deploy
        run: |
          cd ~/project/ai-audio-assistant-web
          git pull
          if git diff HEAD~1 --name-only | grep -qE 'pyproject\.toml|uv\.lock|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f

      - name: Push deploy metrics
        if: always()
        run: bash ~/scripts/push-deploy-metrics.sh ai-audio-assistant-web master ${{ job.status }} ${{ env.BUILD_START }}
