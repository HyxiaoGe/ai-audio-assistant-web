x-build: &default-build
  context: .
  additional_contexts:
    prompthub-sdk: ../prompthub/sdk

services:
  api:
    build: *default-build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://user:pass@192.168.1.10:5432/audio_assistant
      REDIS_URL: redis://192.168.1.10:6379/0
      MINIO_ENDPOINT: 192.168.1.10:9000
      MINIO_USE_SSL: "false"
      PROMPTHUB_BASE_URL: http://prompthub-backend:8000
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "8088:8000"
    restart: unless-stopped
    networks:
      - ai-audio-network

  worker:
    build: *default-build
    command: celery -A worker.celery_app worker --loglevel=info
    env_file: .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://user:pass@192.168.1.10:5432/audio_assistant
      REDIS_URL: redis://192.168.1.10:6379/0
      MINIO_ENDPOINT: 192.168.1.10:9000
      MINIO_USE_SSL: "false"
      PROMPTHUB_BASE_URL: http://prompthub-backend:8000
      CONFIG_CENTER_DB_ENABLED: "false"
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - ai-audio-network

  beat:
    build: *default-build
    command: celery -A worker.celery_app beat --loglevel=info
    env_file: .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://user:pass@192.168.1.10:5432/audio_assistant
      REDIS_URL: redis://192.168.1.10:6379/0
      MINIO_ENDPOINT: 192.168.1.10:9000
      MINIO_USE_SSL: "false"
      PROMPTHUB_BASE_URL: http://prompthub-backend:8000
      CONFIG_CENTER_DB_ENABLED: "false"
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - ai-audio-network

  migrate:
    build: *default-build
    profiles:
      - manual
    command: alembic upgrade head
    env_file: .env
    environment:
      TZ: UTC
      DATABASE_URL: postgresql+asyncpg://user:pass@192.168.1.10:5432/audio_assistant
    volumes:
      - .:/app
    networks:
      - ai-audio-network

networks:
  ai-audio-network:
    external: true
